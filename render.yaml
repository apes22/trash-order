databases:
  - name: tic-management-db
    plan: basic-256mb
    databaseName: tic_management

services:
  - type: web
    name: tic-management
    runtime: docker
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tic-management-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MANAGER_PIN
        value: "1234"
      - key: CREW_PIN
        value: "0000"
      - key: SLING_AUTH_TOKEN
        sync: false
      - key: TOAST_GUID_TRASH_BENTONVILLE
        sync: false
      - key: TOAST_CLIENT_ID_TRASH_BENTONVILLE
        sync: false
      - key: TOAST_CLIENT_SECRET_TRASH_BENTONVILLE
        sync: false
      - key: TOAST_GUID_TRASH_ROGERS
        sync: false
      - key: TOAST_CLIENT_ID_TRASH_ROGERS
        sync: false
      - key: TOAST_CLIENT_SECRET_TRASH_ROGERS
        sync: false
