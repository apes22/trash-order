<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIC Management Tools</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>TIC Management Tools</h1>
      <p>Enter your PIN to continue</p>
      <input type="password" id="login-pin" placeholder="PIN" inputmode="numeric" autocomplete="off">
      <button id="login-btn" class="btn btn-primary">Log In</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- Role Banner (shown on all screens after login) -->
  <div id="role-banner" class="role-banner" style="display:none"></div>

  <!-- Dashboard (tool picker, shown after login) -->
  <div id="dashboard-screen" style="display:none">
    <div class="dashboard">
      <h1>TIC Management Tools</h1>
      <p class="dashboard-sub">Choose a tool</p>
      <div class="dashboard-grid">
        <button class="dashboard-card" onclick="openTool('order')">
          <div class="dashboard-card-icon">O</div>
          <div class="dashboard-card-title">Ordering Guide</div>
          <div class="dashboard-card-desc">PAR levels, inventory counts, suggested orders</div>
        </button>
        <button class="dashboard-card" onclick="openTool('schedule')">
          <div class="dashboard-card-icon">S</div>
          <div class="dashboard-card-title">Scheduling Guide</div>
          <div class="dashboard-card-desc">Build shifts, fairness tracking, push to Sling</div>
        </button>
        <button class="dashboard-card" onclick="openTool('pricing')">
          <div class="dashboard-card-icon">P</div>
          <div class="dashboard-card-title">Pricing Matrix</div>
          <div class="dashboard-card-desc">Recipe costing, COGS, margins per menu item</div>
        </button>
      </div>
      <button class="btn dashboard-logout" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- Ordering Guide App (hidden until selected) -->
  <div id="app-container" style="display:none">

    <header class="no-print">
      <div class="header-top">
        <div class="header-left">
          <button onclick="backToDashboard()" style="background:#374151; color:#d1d5db; padding:5px 14px; border-radius:6px; font-size:13px; font-weight:500; border:none; cursor:pointer; font-family:inherit; line-height:1.4;" onmouseover="this.style.background='#4b5563';this.style.color='#fff'" onmouseout="this.style.background='#374151';this.style.color='#d1d5db'">&larr; Dashboard</button>
          <h1>TIC Ordering Guide</h1>
          <select id="store-select" class="store-select"></select>
        </div>
        <div class="header-actions">
          <button id="add-item-btn" class="btn btn-primary">+ Add Item</button>
          <button id="print-par-btn" class="btn">Print PAR Sheet</button>
          <button id="print-order-btn" class="btn">Print Order Sheet</button>
          <button id="reset-btn" class="btn btn-danger">Reset Data</button>
          <button id="logout-btn" class="btn">Log Out</button>
        </div>
      </div>
      <div class="header-bar">
        <input type="text" id="search-input" placeholder="Search items..." autocomplete="off">
        <div class="col-toggles" id="col-toggles"></div>
      </div>
    </header>

    <div class="print-only" id="print-header">
      <h1>TIC Ordering Guide</h1>
      <div class="print-meta">
        <span id="print-date"></span>
        <span id="print-mode"></span>
      </div>
    </div>

    <main id="table-container"></main>

    <!-- Add / Edit Item Modal -->
    <div id="item-modal" class="modal hidden no-print">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h2 id="modal-title">Add New Item</h2>
        <form id="item-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="f-category">Category</label>
              <select id="f-category" required>
                <option value="BEVERAGE">BEVERAGE</option>
                <option value="ICE CREAM">ICE CREAM</option>
                <option value="TRASH TOPPINGS" selected>TRASH TOPPINGS</option>
                <option value="PAPERGOODS">PAPERGOODS</option>
                <option value="JOB SUPPLIES">JOB SUPPLIES</option>
                <option value="NOT FOR INVENTORY">NOT FOR INVENTORY</option>
              </select>
            </div>
            <div class="form-group">
              <label for="f-vendor">Vendor</label>
              <input type="text" id="f-vendor" required>
            </div>
            <div class="form-group">
              <label for="f-item">Item Name</label>
              <input type="text" id="f-item" required>
            </div>
            <div class="form-group">
              <label for="f-brand">Brand</label>
              <input type="text" id="f-brand">
            </div>
            <div class="form-group">
              <label for="f-packSize">Pack Size</label>
              <input type="text" id="f-packSize" required placeholder="e.g. 24 12 oz">
            </div>
            <div class="form-group">
              <label for="f-unit">Unit</label>
              <input type="text" id="f-unit" value="each">
            </div>
            <div class="form-group">
              <label for="f-pricePerPkg">Price / Pkg ($)</label>
              <input type="number" id="f-pricePerPkg" step="0.01" min="0">
            </div>
            <div class="form-group">
              <label for="f-perOzUnit">Per oz/unit ($)</label>
              <input type="number" id="f-perOzUnit" step="0.01" min="0">
            </div>
            <div class="form-group full-width">
              <label for="f-notes">Notes</label>
              <input type="text" id="f-notes">
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-danger" id="modal-delete" style="display:none; margin-right:auto;">Delete Item</button>
            <button type="button" class="btn" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
